<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ludo Game</title>
<style>
  body {
    margin: 0;
    background: #1a1a2e;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 8px;
  }

  h1 {
    margin: 0 0 8px;
    background: linear-gradient(90deg, #ff2d2d, #00e676, #ffd600, #00b0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 28px;
    font-weight: 900;
  }

  #board {
    display: grid;
    grid-template-columns: repeat(15, 1fr);
    grid-template-rows: repeat(15, 1fr);
    width: min(85vw, 420px);
    height: min(85vw, 420px);
    background: #222;
    border: 2px solid #000;
    gap: 0.5px;
  }

 .cell {
    background: #e8e8e8;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

 .safe { background: #ffc400!important; border: 1px solid #ff9100; }
 .home-red { background: #ff1744!important; border: 1px solid #d50000; }
 .home-green { background: #00e676!important; border: 1px solid #00c853; }
 .home-yellow { background: #ffea00!important; border: 1px solid #ffd600; }
 .home-blue { background: #00b0ff!important; border: 1px solid #0091ea; }
 .path-red { background: #ff8a80!important; }
 .path-green { background: #69f0ae!important; }
 .path-yellow { background: #ffff8d!important; }
 .path-blue { background: #80d8ff!important; }
 .center { background: linear-gradient(45deg, #ff1744, #00e676, #ffea00, #00b0ff)!important; }

 .token {
    width: 75%;
    height: 75%;
    border-radius: 50%;
    border: 2px solid #000;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    cursor: pointer;
    transition: transform 0.15s;
  }

 .token:hover { transform: scale(1.15); }
 .token.red { background: #ff1744; }
 .token.green { background: #00e676; }
 .token.yellow { background: #ffea00; }
 .token.blue { background: #00b0ff; }

 .controls {
    margin-top: 12px;
    text-align: center;
    width: 100%;
  }

 .dice-container {
    display: flex;
    justify-content: space-around;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

 .dice-btn {
    flex: 1;
    min-width: 70px;
    padding: 8px 4px;
    font-size: 14px;
    font-weight: bold;
    border: 2px solid #000;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0.4;
  }

 .dice-btn.active {
    opacity: 1;
    transform: scale(1.05);
    box-shadow: 0 0 12px currentColor;
  }

 .dice-btn.red { background: #ff1744; color: white; }
 .dice-btn.green { background: #00e676; color: #000; }
 .dice-btn.yellow { background: #ffea00; color: #000; }
 .dice-btn.blue { background: #00b0ff; color: white; }

 .dice-btn:disabled { cursor: not-allowed; }

 .dice-value {
    font-size: 24px;
    display: block;
  }

  #turn {
    font-size: 18px;
    margin-bottom: 8px;
    font-weight: bold;
  }

 .player-info {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

 .player-badge {
    padding: 4px 10px;
    border-radius: 15px;
    font-weight: bold;
    font-size: 13px;
    border: 2px solid #000;
  }

 .badge-red { background: #ff1744; }
 .badge-green { background: #00e676; color: #000; }
 .badge-yellow { background: #ffea00; color: #000; }
 .badge-blue { background: #00b0ff; }
</style>
</head>
<body>

<h1>🎲 LUDO GAME 🎲</h1>

<div class="player-info">
  <div class="player-badge badge-red">Red</div>
  <div class="player-badge badge-green">Green</div>
  <div class="player-badge badge-yellow">Yellow</div>
  <div class="player-badge badge-blue">Blue</div>
</div>

<div id="turn">Red's Turn</div>
<div id="board"></div>

<div class="controls">
  <div class="dice-container">
    <button class="dice-btn red active" id="dice-red" onclick="rollDice(0)">
      RED<br><span class="dice-value">🎲</span>
    </button>
    <button class="dice-btn green" id="dice-green" onclick="rollDice(1)">
      GREEN<br><span class="dice-value">🎲</span>
    </button>
    <button class="dice-btn yellow" id="dice-yellow" onclick="rollDice(2)">
      YELLOW<br><span class="dice-value">🎲</span>
    </button>
    <button class="dice-btn blue" id="dice-blue" onclick="rollDice(3)">
      BLUE<br><span class="dice-value">🎲</span>
    </button>
  </div>
</div>

<script>
const colors = ['red', 'green', 'yellow', 'blue'];
const colorNames = ['Red', 'Green', 'Yellow', 'Blue'];
let currentPlayer = 0;
let diceValue = 0;
let hasRolled = false;
let tokens = {};
let gameOver = false;

colors.forEach(color => {
  tokens[color] = [
    {pos: -1, home: true},
    {pos: -1, home: true},
    {pos: -1, home: true},
    {pos: -1, home: true}
  ];
});

const path = [
  [6,1],[6,2],[6,3],[6,4],[6,5],[5,6],[4,6],[3,6],[2,6],[1,6],[0,6],
  [0,7],[0,8],[1,8],[2,8],[3,8],[4,8],[5,8],[6,9],[6,10],[6,11],[6,12],[6,13],[6,14],
  [7,14],[8,14],[8,13],[8,12],[8,11],[8,10],[8,9],[9,8],[10,8],[11,8],[12,8],[13,8],[14,8],
  [14,7],[14,6],[13,6],[12,6],[11,6],[10,6],[9,6],[8,5],[8,4],[8,3],[8,2],[8,1],[8,0],
  [7,0],[7,1]
];

const safePositions = [0, 8, 13, 21, 26, 34, 39, 47];
const homeEntries = {red: 0, green: 13, yellow: 26, blue: 39};

function createBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  for(let row=0; row<15; row++) {
    for(let col=0; col<15; col++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = row;
      cell.dataset.col = col;

      if((row<6 && col<6)) cell.className += ' home-red';
      else if((row<6 && col>8)) cell.className += ' home-green';
      else if((row>8 && col<6)) cell.className += ' home-yellow';
      else if((row>8 && col>8)) cell.className += ' home-blue';
      else if(row===7 && col===7) cell.className += ' center';
      else {
        const pathIndex = path.findIndex(p => p[0]===row && p[1]===col);
        if(pathIndex!== -1) {
          if(safePositions.includes(pathIndex)) cell.className += ' safe';
          if(pathIndex>=0 && pathIndex<=12) cell.className += ' path-red';
          if(pathIndex>=13 && pathIndex<=25) cell.className += ' path-green';
          if(pathIndex>=26 && pathIndex<=38) cell.className += ' path-yellow';
          if(pathIndex>=39 && pathIndex<=51) cell.className += ' path-blue';
        }
      }
      board.appendChild(cell);
    }
  }
  renderTokens();
}

function renderTokens() {
  document.querySelectorAll('.token').forEach(t => t.remove());
  colors.forEach(color => {
    tokens[color].forEach((token, idx) => {
      let row, col;
      if(token.home) {
        const homePos = {
          red: [[1,1],[1,4],[4,1],[4,4]],
          green: [[1,10],[1,13],[4,10],[4,13]],
          yellow: [[10,1],[10,4],[13,1],[13,4]],
          blue: [[10,10],[10,13],[13,10],[13,13]]
        };
        [row, col] = homePos[color][idx];
      } else if(token.pos === 52) return;
      else [row, col] = path[token.pos];

      const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
      if(cell) {
        const tokenEl = document.createElement('div');
        tokenEl.className = `token ${color}`;
        tokenEl.onclick = () => moveToken(color, idx);
        cell.appendChild(tokenEl);
      }
    });
  });
}

function rollDice(playerIdx) {
  if(playerIdx!== currentPlayer || hasRolled || gameOver) return;

  diceValue = Math.floor(Math.random() * 6) + 1;
  document.querySelectorAll('.dice-value')[playerIdx].textContent = diceValue;
  hasRolled = true;

  const movable = canMove();
  if(!movable) {
    setTimeout(nextTurn, 1200);
  }
}

function canMove() {
  const color = colors[currentPlayer];
  return tokens[color].some(token => {
    if(token.pos === 52) return false;
    if(token.home) return diceValue === 6;
    return true;
  });
}

function moveToken(color, idx) {
  if(color!== colors[currentPlayer] ||!hasRolled || gameOver) return;
  const token = tokens[color][idx];

  if(token.home) {
    if(diceValue === 6) {
      token.home = false;
      token.pos = homeEntries[color];
      checkKill(color, idx);
      endTurn();
    }
    return;
  }

  let newPos = token.pos + diceValue;
  if(newPos > 52) return;
  token.pos = newPos;

  if(newPos < 52) checkKill(color, idx);
  endTurn();
}

function checkKill(color, idx) {
  const token = tokens[color][idx];
  if(safePositions.includes(token.pos)) return;
  colors.forEach(otherColor => {
    if(otherColor === color) return;
    tokens[otherColor].forEach(t => {
      if(!t.home && t.pos === token.pos && t.pos < 52) {
        t.home = true;
        t.pos = -1;
      }
    });
  });
}

function endTurn() {
  renderTokens();
  if(tokens[colors[currentPlayer]].every(t => t.pos === 52)) {
    alert(colorNames[currentPlayer] + ' Wins! 🎉');
    gameOver = true;
    return;
  }
  if(diceValue === 6) {
    hasRolled = false;
    return;
  }
  nextTurn();
}

function nextTurn() {
  currentPlayer = (currentPlayer + 1) % 4;
  hasRolled = false;
  diceValue = 0;
  updateDiceUI();
  document.getElementById('turn').textContent = colorNames[currentPlayer] + "'s Turn";
  document.getElementById('turn').style.color = colors[currentPlayer];
}

function updateDiceUI() {
  document.querySelectorAll('.dice-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === currentPlayer);
    btn.disabled = i!== currentPlayer;
    document.querySelectorAll('.dice-value')[i].textContent = '🎲';
  });
}

createBoard();
updateDiceUI();
document.getElementById('turn').style.color = colors[0];
</script>

</body>
</html>
