<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HD Ludo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: radial-gradient(circle at 20% 20%, #4a5f9c 0%, #1e2a4a 70%, #0f172a 100%);
    font-family: 'Poppins', sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px;
    overflow-x: hidden;
  }

  /* Glass header */
 .top-bar {
    width: 100%;
    max-width: 500px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    margin-bottom: 14px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

 .menu-icon {
    font-size: 26px;
    cursor: pointer;
    opacity: 0.9;
  }

 .player-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.12);
    padding: 6px 14px;
    border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.2);
  }

 .player-card img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.8);
    box-shadow: 0 0 12px rgba(255,255,255,0.3);
  }

 .player-name { font-size: 14px; font-weight: 700; }
 .player-percent { font-size: 12px; opacity: 0.8; }

  /* Premium board */
 .board-wrapper {
    background: linear-gradient(145deg, #e8d5b7, #c9b088);
    padding: 12px;
    border-radius: 28px;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.5),
      inset 0 2px 0 rgba(255,255,255,0.4),
      inset 0 -2px 0 rgba(0,0,0,0.2);
    width: min(92vw, 480px);
  }

  #board {
    display: grid;
    grid-template-columns: repeat(15, 1fr);
    grid-template-rows: repeat(15, 1fr);
    width: 100%;
    aspect-ratio: 1;
    background: #fafafa;
    border-radius: 20px;
    overflow: hidden;
    gap: 0.8px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
  }

 .cell {
    background: #f8f8f8;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

 .home-red {
    background: linear-gradient(135deg, #ff5252, #d32f2f);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
  }
 .home-green {
    background: linear-gradient(135deg, #66bb6a, #388e3c);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
  }
 .home-yellow {
    background: linear-gradient(135deg, #ffd54f, #fbc02d);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
  }
 .home-blue {
    background: linear-gradient(135deg, #42a5f5, #1976d2);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
  }

 .path-red { background: linear-gradient(135deg, #ffcdd2, #ef9a9a); }
 .path-green { background: linear-gradient(135deg, #c8e6c9, #a5d6a7); }
 .path-yellow { background: linear-gradient(135deg, #fff9c4, #fff59d); }
 .path-blue { background: linear-gradient(135deg, #bbdefb, #90caf9); }

 .safe {
    background: #e8e8e8;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.8);
  }
 .safe::after {
    content: '🛡️';
    font-size: 11px;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
  }

 .center {
    background: conic-gradient(from 45deg, #f44336, #ffc107, #2196f3, #8bc34a, #f44336);
    box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
  }

  /* HD 3D Tokens */
 .token {
    width: 88%;
    height: 88%;
    position: relative;
    cursor: pointer;
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.4));
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

 .token:hover {
    transform: scale(1.15) translateY(-2px);
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
  }

 .token::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.25);
    box-shadow:
      inset 0 -6px 0 rgba(0,0,0,0.25),
      inset 0 6px 0 rgba(255,255,255,0.4),
      inset 0 0 15px rgba(255,255,255,0.3);
  }

 .token.red::before { background: radial-gradient(circle at 30% 25%, #ff8a80, #f44336 60%, #c62828); }
 .token.green::before { background: radial-gradient(circle at 30% 25%, #aed581, #66bb6a 60%, #388e3c); }
 .token.yellow::before { background: radial-gradient(circle at 30% 25%, #ffe082, #ffd54f 60%, #f9a825); }
 .token.blue::before { background: radial-gradient(circle at 30% 25%, #90caf9, #42a5f5 60%, #1565c0); }

 .home-dots {
    position: absolute;
    inset: 15%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8px;
  }

 .home-dot {
    background: rgba(0,0,0,0.15);
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.25);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
  }

  /* Premium Dice */
 .dice-box {
    width: 78px;
    height: 78px;
    background: linear-gradient(145deg, #ffffff, #f0f0f0);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    font-weight: 700;
    color: #1a1a1a;
    box-shadow:
      0 10px 30px rgba(0,0,0,0.4),
      inset 0 2px 0 rgba(255,255,255,0.8),
      inset 0 -2px 0 rgba(0,0,0,0.1);
    cursor: pointer;
    transition: all 0.15s;
    margin: 18px auto;
    border: 1px solid rgba(255,255,255,0.5);
  }

 .dice-box:active {
    transform: scale(0.93);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }

 .dice-box.disabled {
    opacity: 0.4;
    pointer-events: none;
  }

 .dice-rolling {
    animation: rollDice 0.9s cubic-bezier(0.36, 0, 0.66, -0.56);
  }

  @keyframes rollDice {
    0% { transform: rotate(0deg) scale(1); }
    20% { transform: rotate(120deg) scale(1.15); }
    40% { transform: rotate(240deg) scale(1.25); }
    60% { transform: rotate(360deg) scale(1.15); }
    80% { transform: rotate(480deg) scale(1.05); }
    100% { transform: rotate(600deg) scale(1); }
  }

 .turn-indicator {
    text-align: center;
    margin: 12px 0;
    font-size: 20px;
    font-weight: 700;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    letter-spacing: 0.5px;
  }

 .bottom-nav {
    margin-top: auto;
    width: 100%;
    max-width: 500px;
    display: flex;
    justify-content: space-around;
    padding: 16px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    margin-top: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

 .nav-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 12px 24px;
    border-radius: 16px;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    transition: all 0.2s;
  }

 .nav-btn:active {
    transform: scale(0.92);
    background: rgba(255,255,255,0.2);
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="menu-icon">☰</div>
  <div class="player-card" style="margin-left:auto;">
    <img src="https://i.pravatar.cc/40?img=5" alt="">
    <div>
      <div class="player-name">Amala So..</div>
      <div class="player-percent">32%</div>
    </div>
  </div>
</div>

<div class="board-wrapper">
  <div id="board"></div>
</div>

<div class="turn-indicator" id="turn">Blue's Turn</div>
<div class="dice-box" id="dice">🎲</div>

<div class="bottom-nav">
  <button class="nav-btn">😊</button>
  <button class="nav-btn">🎤</button>
  <button class="nav-btn">💬</button>
</div>

<script>
const colors = ['red', 'green', 'yellow', 'blue'];
const colorNames = ['Red', 'Green', 'Yellow', 'Blue'];
let currentPlayer = 3;
let diceValue = 0;
let hasRolled = false;
let tokens = {};
let gameOver = false;
let isRolling = false;

colors.forEach(color => {
  tokens[color] = [
    {pos: -1, home: true},
    {pos: -1, home: true},
    {pos: -1, home: true},
    {pos: -1, home: true}
  ];
});

const path = [
  [6,1],[6,2],[6,3],[6,4],[6,5],[5,6],[4,6],[3,6],[2,6],[1,6],[0,6],
  [0,7],[0,8],[1,8],[2,8],[3,8],[4,8],[5,8],[6,9],[6,10],[6,11],[6,12],[6,13],[6,14],
  [7,14],[8,14],[8,13],[8,12],[8,11],[8,10],[8,9],[9,8],[10,8],[11,8],[12,8],[13,8],[14,8],
  [14,7],[14,6],[13,6],[12,6],[11,6],[10,6],[9,6],[8,5],[8,4],[8,3],[8,2],[8,1],[8,0],
  [7,0],[7,1]
];

const safePositions = [0, 8, 13, 21, 26, 34, 39, 47];
const homeEntries = {red: 0, green: 13, yellow: 26, blue: 39};

function createBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  for(let row=0; row<15; row++) {
    for(let col=0; col<15; col++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = row;
      cell.dataset.col = col;

      if(row<6 && col<6) {
        cell.className += ' home-red';
        if(row>=2 && row<=3 && col>=2 && col<=3) cell.innerHTML = '<div class="home-dot"></div>';
      }
      else if(row<6 && col>8) {
        cell.className += ' home-green';
        if(row>=2 && row<=3 && col>=11 && col<=12) cell.innerHTML = '<div class="home-dot"></div>';
      }
      else if(row>8 && col<6) {
        cell.className += ' home-yellow';
        if(row>=11 && row<=12 && col>=2 && col<=3) cell.innerHTML = '<div class="home-dot"></div>';
      }
      else if(row>8 && col>8) {
        cell.className += ' home-blue';
        if(row>=11 && row<=12 && col>=11 && col<=12) cell.innerHTML = '<div class="home-dot"></div>';
      }
      else if(row===7 && col===7) {
        cell.className += ' center';
      }
      else {
        const pathIndex = path.findIndex(p => p[0]===row && p[1]===col);
        if(pathIndex!== -1) {
          if(safePositions.includes(pathIndex)) cell.className += ' safe';
          if(pathIndex>=0 && pathIndex<=12) cell.className += ' path-red';
          if(pathIndex>=13 && pathIndex<=25) cell.className += ' path-green';
          if(pathIndex>=26 && pathIndex<=38) cell.className += ' path-yellow';
          if(pathIndex>=39 && pathIndex<=51) cell.className += ' path-blue';
        }
      }
      board.appendChild(cell);
    }
  }
  renderTokens();
}

function renderTokens() {
  document.querySelectorAll('.token').forEach(t => t.remove());
  colors.forEach(color => {
    tokens[color].forEach((token, idx) => {
      let row, col;
      if(token.home) {
        const homePos = {
          red: [[11,2],[11,3],[12,2],[12,3]],
          green: [[2,11],[2,12],[3,11],[3,12]],
          yellow: [[11,11],[11,12],[12,11],[12,12]],
          blue: [[2,2],[2,3],[3,2],[3,3]]
        };
        [row, col] = homePos[color][idx];
      } else if(token.pos === 52) return;
      else [row, col] = path[token.pos];

      const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
      if(cell) {
        const tokenEl = document.createElement('div');
        tokenEl.className = `token ${color}`;
        tokenEl.onclick = () => moveToken(color, idx);
        cell.appendChild(tokenEl);
      }
    });
  });
}

document.getElementById('dice').onclick = () => {
  if(hasRolled || gameOver || isRolling) return;
  rollDiceWithAnimation();
};

function rollDiceWithAnimation() {
  isRolling = true;
  const diceEl = document.getElementById('dice');
  diceEl.classList.add('dice-rolling');
  diceEl.textContent = '🎲';

  let rollCount = 0;
  const rollInterval = setInterval(() => {
    diceEl.textContent = Math.floor(Math.random() * 6) + 1;
    rollCount++;
    if(rollCount >= 9) {
      clearInterval(rollInterval);
      diceValue = Math.floor(Math.random() * 6) + 1;
      diceEl.textContent = diceValue;
      diceEl.classList.remove('dice-rolling');
      isRolling = false;
      hasRolled = true;

      const movable = canMove();
      if(!movable) setTimeout(nextTurn, 1200);
    }
  }, 100);
}

function canMove() {
  const color = colors[currentPlayer];
  return tokens[color].some(token => {
    if(token.pos === 52) return false;
    if(token.home) return diceValue === 6;
    return true;
  });
}

function moveToken(color, idx) {
  if(color!== colors[currentPlayer] ||!hasRolled || gameOver || isRolling) return;
  const token = tokens[color][idx];

  if(token.home && diceValue === 6) {
    token.home = false;
    token.pos = homeEntries[color];
    checkKill(color, idx);
    endTurn();
    return;
  }

  let newPos = token.pos + diceValue;
  if(newPos > 52) return;
  token.pos = newPos;
  if(newPos < 52) checkKill(color, idx);
  endTurn();
}

function checkKill(color, idx) {
  const token = tokens[color][idx];
  if(safePositions.includes(token.pos)) return;
  colors.forEach(otherColor => {
    if(otherColor === color) return;
    tokens[otherColor].forEach(t => {
      if(!t.home && t.pos === token.pos && t.pos < 52) {
        t.home = true;
        t.pos = -1;
      }
    });
  });
}

function endTurn() {
  renderTokens();
  if(tokens[colors[currentPlayer]].every(t => t.pos === 52)) {
    setTimeout(() => alert(colorNames[currentPlayer] + ' Wins! 🎉'), 300);
    gameOver = true;
    return;
  }
  if(diceValue === 6) {
    hasRolled = false;
    return;
  }
  nextTurn();
}

function nextTurn() {
  currentPlayer = (currentPlayer + 1) % 4;
  hasRolled = false;
  diceValue = 0;
  document.getElementById('dice').textContent = '🎲';
  document.getElementById('turn').textContent = colorNames[currentPlayer] + "'s Turn";
  document.getElementById('turn').style.color = colors[currentPlayer] === 'yellow'? '#ffd54f' : colors[currentPlayer];
}

createBoard();
</script>

</body>
</html>
