<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ludo Game</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(180deg, #3a4b7c 0%, #1e2a4a 100%);
    font-family: 'Segoe UI', Roboto, sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
  }

.top-bar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 10px;
    margin-bottom: 8px;
  }

.menu-icon { font-size: 28px; cursor: pointer; }

.player-card {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0,0,0,0.3);
    padding: 4px 10px;
    border-radius: 20px;
  }

.player-card img {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid #fff;
  }

.player-name { font-size: 13px; font-weight: 600; }
.player-percent { font-size: 11px; opacity: 0.8; }

.board-wrapper {
    background: #d4b88a;
    padding: 8px;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    width: min(92vw, 420px);
  }

  #board {
    display: grid;
    grid-template-columns: repeat(15, 1fr);
    grid-template-rows: repeat(15, 1fr);
    width: 100%;
    aspect-ratio: 1;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
    gap: 0.5px;
  }

.cell {
    background: #f5f5f5;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

.home-red { background: #f44336; }
.home-green { background: #8bc34a; }
.home-yellow { background: #ffc107; }
.home-blue { background: #2196f3; }

.path-red { background: #ef9a9a; }
.path-green { background: #aed581; }
.path-yellow { background: #fff59d; }
.path-blue { background: #90caf9; }

.safe { background: #e0e0e0; }
.safe::after {
    content: '🛡️';
    font-size: 10px;
    opacity: 0.6;
  }

.center {
    background: linear-gradient(135deg, #f44336 25%, #ffc107 25%, #ffc107 50%, #2196f3 50%, #2196f3 75%, #8bc34a 75%);
  }

.token {
    width: 85%;
    height: 85%;
    position: relative;
    cursor: pointer;
    filter: drop-shadow(0 3px 4px rgba(0,0,0,0.4));
    transition: transform 0.2s;
  }

.token:hover { transform: scale(1.1); }

.token::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.3);
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), inset 0 4px 0 rgba(255,255,255,0.3);
  }

.token.red::before { background: radial-gradient(circle at 30% 30%, #ff7961, #f44336); }
.token.green::before { background: radial-gradient(circle at 30% 30%, #b2ff59, #8bc34a); }
.token.yellow::before { background: radial-gradient(circle at 30% 30%, #ffe082, #ffc107); }
.token.blue::before { background: radial-gradient(circle at 30% 30%, #64b5f6, #2196f3); }

.home-dots {
    position: absolute;
    inset: 12%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 6px;
  }

.home-dot {
    background: rgba(0,0,0,0.2);
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.3);
  }

.dice-box {
    width: 70px;
    height: 70px;
    background: #fff;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-weight: bold;
    color: #333;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    cursor: pointer;
    transition: transform 0.1s;
    margin: 15px auto;
  }

.dice-box:active { transform: scale(0.95); }
.dice-box.disabled { opacity: 0.5; pointer-events: none; }

.dice-rolling {
    animation: rollDice 0.8s ease-out;
  }

  @keyframes rollDice {
    0% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(90deg) scale(1.1); }
    50% { transform: rotate(180deg) scale(1.2); }
    75% { transform: rotate(270deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }

.turn-indicator {
    text-align: center;
    margin: 10px 0;
    font-size: 18px;
    font-weight: 600;
  }

.bottom-nav {
    margin-top: auto;
    width: 100%;
    display: flex;
    justify-content: space-around;
    padding: 15px 0;
    background: rgba(0,0,0,0.2);
    border-radius: 15px;
    margin-top: 20px;
  }

.nav-btn {
    background: rgba(0,0,0,0.3);
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="top-bar">
  <div class="menu-icon">☰</div>
  <div class="player-card" style="margin-left:auto;">
    <img src="https://i.pravatar.cc/40?img=5" alt="">
    <div>
      <div class="player-name">Amala So..</div>
      <div class="player-percent">32%</div>
    </div>
  </div>
</div>

<div class="board-wrapper">
  <div id="board"></div>
</div>

<div class="turn-indicator" id="turn">Blue's Turn</div>
<div class="dice-box" id="dice">🎲</div>

<div class="bottom-nav">
  <button class="nav-btn">😊</button>
  <button class="nav-btn">🎤</button>
  <button class="nav-btn">💬</button>
</div>

<script>
const colors = ['red', 'green', 'yellow', 'blue'];
const colorNames = ['Red', 'Green', 'Yellow', 'Blue'];
let currentPlayer = 3; // Blue's turn as in your screenshot
let diceValue = 0;
let hasRolled = false;
let tokens = {};
let gameOver = false;
let isRolling = false;

colors.forEach(color => {
  tokens[color] = [
    {pos: -1, home: true},
    {pos: -1, home: true},
    {pos: -1, home: true},
    {pos: -1, home: true}
  ];
});

const path = [
  [6,1],[6,2],[6,3],[6,4],[6,5],[5,6],[4,6],[3,6],[2,6],[1,6],[0,6],
  [0,7],[0,8],[1,8],[2,8],[3,8],[4,8],[5,8],[6,9],[6,10],[6,11],[6,12],[6,13],[6,14],
  [7,14],[8,14],[8,13],[8,12],[8,11],[8,10],[8,9],[9,8],[10,8],[11,8],[12,8],[13,8],[14,8],
  [14,7],[14,6],[13,6],[12,6],[11,6],[10,6],[9,6],[8,5],[8,4],[8,3],[8,2],[8,1],[8,0],
  [7,0],[7,1]
];

const safePositions = [0, 8, 13, 21, 26, 34, 39, 47];
const homeEntries = {red: 0, green: 13, yellow: 26, blue: 39};

function createBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  for(let row=0; row<15; row++) {
    for(let col=0; col<15; col++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = row;
      cell.dataset.col = col;

      if(row<6 && col<6) {
        cell.className += ' home-red';
        if(row>=2 && row<=3 && col>=2 && col<=3) cell.innerHTML = '<div class="home-dot"></div>';
      }
      else if(row<6 && col>8) {
        cell.className += ' home-green';
        if(row>=2 && row<=3 && col>=11 && col<=12) cell.innerHTML = '<div class="home-dot"></div>';
      }
      else if(row>8 && col<6) {
        cell.className += ' home-yellow';
        if(row>=11 && row<=12 && col>=2 && col<=3) cell.innerHTML = '<div class="home-dot"></div>';
      }
      else if(row>8 && col>8) {
        cell.className += ' home-blue';
        if(row>=11 && row<=12 && col>=11 && col<=12) cell.innerHTML = '<div class="home-dot"></div>';
      }
      else if(row===7 && col===7) {
        cell.className += ' center';
      }
      else {
        const pathIndex = path.findIndex(p => p[0]===row && p[1]===col);
        if(pathIndex!== -1) {
          if(safePositions.includes(pathIndex)) cell.className += ' safe';
          if(pathIndex>=0 && pathIndex<=12) cell.className += ' path-red';
          if(pathIndex>=13 && pathIndex<=25) cell.className += ' path-green';
          if(pathIndex>=26 && pathIndex<=38) cell.className += ' path-yellow';
          if(pathIndex>=39 && pathIndex<=51) cell.className += ' path-blue';
        }
      }
      board.appendChild(cell);
    }
  }
  renderTokens();
}

function renderTokens() {
  document.querySelectorAll('.token').forEach(t => t.remove());
  colors.forEach(color => {
    tokens[color].forEach((token, idx) => {
      let row, col;
      if(token.home) {
        const homePos = {
          red: [[11,2],[11,3],[12,2],[12,3]],
          green: [[2,11],[2,12],[3,11],[3,12]],
          yellow: [[11,11],[11,12],[12,11],[12,12]],
          blue: [[2,2],[2,3],[3,2],[3,3]]
        };
        [row, col] = homePos[color][idx];
      } else if(token.pos === 52) return;
      else [row, col] = path[token.pos];

      const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
      if(cell) {
        const tokenEl = document.createElement('div');
        tokenEl.className = `token ${color}`;
        tokenEl.onclick = () => moveToken(color, idx);
        cell.appendChild(tokenEl);
      }
    });
  });
}

document.getElementById('dice').onclick = () => {
  if(hasRolled || gameOver || isRolling) return;
  rollDiceWithAnimation();
};

function rollDiceWithAnimation() {
  isRolling = true;
  const diceEl = document.getElementById('dice');
  diceEl.classList.add('dice-rolling');
  diceEl.textContent = '🎲';

  let rollCount = 0;
  const rollInterval = setInterval(() => {
    diceEl.textContent = Math.floor(Math.random() * 6) + 1;
    rollCount++;
    if(rollCount >= 8) {
      clearInterval(rollInterval);
      diceValue = Math.floor(Math.random() * 6) + 1;
      diceEl.textContent = diceValue;
      diceEl.classList.remove('dice-rolling');
      isRolling = false;
      hasRolled = true;

      const movable = canMove();
      if(!movable) setTimeout(nextTurn, 1200);
    }
  }, 100);
}

function canMove() {
  const color = colors[currentPlayer];
  return tokens[color].some(token => {
    if(token.pos === 52) return false;
    if(token.home) return diceValue === 6;
    return true;
  });
}

function moveToken(color, idx) {
  if(color!== colors[currentPlayer] ||!hasRolled || gameOver || isRolling) return;
  const token = tokens[color][idx];

  if(token.home && diceValue === 6) {
    token.home = false;
    token.pos = homeEntries[color];
    checkKill(color, idx);
    endTurn();
    return;
  }

  let newPos = token.pos + diceValue;
  if(newPos > 52) return;
  token.pos = newPos;
  if(newPos < 52) checkKill(color, idx);
  endTurn();
}

function checkKill(color, idx) {
  const token = tokens[color][idx];
  if(safePositions.includes(token.pos)) return;
  colors.forEach(otherColor => {
    if(otherColor === color) return;
    tokens[otherColor].forEach(t => {
      if(!t.home && t.pos === token.pos && t.pos < 52) {
        t.home = true;
        t.pos = -1;
      }
    });
  });
}

function endTurn() {
  renderTokens();
  if(tokens[colors[currentPlayer]].every(t => t.pos === 52)) {
    alert(colorNames[currentPlayer] + ' Wins! 🎉');
    gameOver = true;
    return;
  }
  if(diceValue === 6) {
    hasRolled = false;
    return;
  }
  nextTurn();
}

function nextTurn() {
  currentPlayer = (currentPlayer + 1) % 4;
  hasRolled = false;
  diceValue = 0;
  document.getElementById('dice').textContent = '🎲';
  document.getElementById('dice').classList.remove('disabled');
  document.getElementById('turn').textContent = colorNames[currentPlayer] + "'s Turn";
  document.getElementById('turn').style.color = colors[currentPlayer];
}

createBoard();
</script>

</body>
</html>
