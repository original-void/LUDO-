<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>HD Ludo 4x4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@500;700&display=swap');

  body {
    background: radial-gradient(circle at 20% 20%, #4a5f9c 0%, #1e2a4a 70%, #0f172a 100%);
    font-family: 'Poppins', sans-serif;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }

  /* 4x4 board layout */
.board-wrapper {
    background: linear-gradient(145deg, #e8d5b7, #c9b088);
    padding: 12px;
    border-radius: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    width: min(90vw, 400px);
  }

  #board {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    width: 100%;
    aspect-ratio: 1;
    background: #fafafa;
    border-radius: 20px;
    gap: 2px;
    position: relative;
    overflow: hidden;
  }

.cell {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 4 colored homes - corners */
.home-red { background: linear-gradient(135deg, #ff5252, #d32f2f); border-radius: 20px 0 0 0; }
.home-green { background: linear-gradient(135deg, #66bb6a, #388e3c); border-radius: 0 20px 0 0; }
.home-yellow { background: linear-gradient(135deg, #ffd54f, #fbc02d); border-radius: 0 0 0 20px; }
.home-blue { background: linear-gradient(135deg, #42a5f5, #1976d2); border-radius: 0 0 20px 0; }

  /* Center */
.center {
    background: conic-gradient(from 45deg, #f44336, #ffc107, #2196f3, #8bc34a, #f44336);
    border-radius: 12px;
  }

  /* Path arms */
.path {
    background: #e0e0e0;
  }

  /* HD 3D Tokens - smaller now */
.token {
    width: 65%;
    height: 65%;
    position: absolute;
    cursor: pointer;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 10;
  }

.token::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.25);
    box-shadow: inset 0 -4px 0 rgba(0,0,0,0.25), inset 0 4px 0 rgba(255,255,255,0.4);
  }

.token.red::before { background: radial-gradient(circle at 30% 25%, #ff8a80, #f44336); }
.token.green::before { background: radial-gradient(circle at 30% 25%, #aed581, #66bb6a); }
.token.yellow::before { background: radial-gradient(circle at 30% 25%, #ffe082, #ffd54f); }
.token.blue::before { background: radial-gradient(circle at 30% 25%, #90caf9, #42a5f5); }

  /* Dice */
.dice-box {
    width: 70px;
    height: 70px;
    background: linear-gradient(145deg, #ffffff, #f0f0f0);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-weight: 700;
    color: #1a1a1a;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    cursor: pointer;
    margin: 18px auto;
  }

.dice-rolling { animation: rollDice 0.9s ease-out; }

  @keyframes rollDice {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(720deg); }
  }

.turn-indicator {
    text-align: center;
    margin: 12px 0;
    font-size: 20px;
    font-weight: 700;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

<div class="board-wrapper">
  <div id="board"></div>
</div>

<div class="turn-indicator" id="turn">Red's Turn</div>
<div class="dice-box" id="dice">🎲</div>

<script>
const colors = ['red', 'green', 'yellow', 'blue'];
let currentPlayer = 0;
let diceValue = 0;
let hasRolled = false;
let gameOver = false;
let isRolling = false;

// 4 tokens per color, -1 = home, 0-15 = path positions, 16 = center
let tokens = {};
colors.forEach(c => tokens[c] = [-1,-1,-1,-1]);

// Path layout for 4x4 board:
// 0: Red arm, 1: Green arm, 2: Yellow arm, 3: Blue arm
// Each arm has 4 steps to center
const pathCoords = [
  // Red arm: row 0, col 1-2-3-3
  [0,1], [0,2], [0,3], [1,3],
  // Green arm: row 1-2-3, col 3
  [2,3], [3,3], [3,2], [3,1],
  // Yellow arm: row 3, col 0-1-2
  [3,0], [2,0], [1,0], [0,0],
  // Blue arm: row 0-1-2, col 0
  [1,1], [2,1], [2,2], [1,2] // These 4 lead to center
];

const homePositions = {
  red: [[0,0]],
  green: [[0,3]],
  yellow: [[3,0]],
  blue: [[3,3]]
};

const centerPos = [1,2]; // Center cell

function createBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  // Create 4x4 grid
  for(let r=0; r<4; r++) {
    for(let c=0; c<4; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.row = r;
      cell.dataset.col = c;

      if(r===0 && c===0) cell.className += ' home-red';
      else if(r===0 && c===3) cell.className += ' home-green';
      else if(r===3 && c===0) cell.className += ' home-yellow';
      else if(r===3 && c===3) cell.className += ' home-blue';
      else if(r===1 && c===1 || r===1 && c===2 || r===2 && c===1 || r===2 && c===2) {
        cell.className += ' center';
      }
      else {
        cell.className += ' path';
      }

      board.appendChild(cell);
    }
  }
  createTokens();
  positionTokens();
}

function createTokens() {
  colors.forEach(color => {
    tokens[color].forEach((pos, idx) => {
      const tokenEl = document.createElement('div');
      tokenEl.className = `token ${color}`;
      tokenEl.dataset.color = color;
      tokenEl.dataset.idx = idx;
      tokenEl.onclick = () => moveToken(color, idx);
      document.getElementById('board').appendChild(tokenEl);
    });
  });
}

function positionTokens() {
  colors.forEach(color => {
    tokens[color].forEach((pos, idx) => {
      const tokenEl = document.querySelector(`.token[data-color="${color}"][data-idx="${idx}"]`);
      let row, col;

      if(pos === -1) {
        // In home
        [row, col] = homePositions[color][0];
      } else if(pos === 16) {
        // At center
        [row, col] = centerPos;
      } else {
        // On path
        [row, col] = pathCoords[pos];
      }

      const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
      const boardRect = document.getElementById('board').getBoundingClientRect();
      const cellRect = cell.getBoundingClientRect();

      tokenEl.style.left = (cellRect.left - boardRect.left + cellRect.width/2 - 20) + 'px';
      tokenEl.style.top = (cellRect.top - boardRect.top + cellRect.height/2 - 20) + 'px';
    });
  });
}

document.getElementById('dice').onclick = () => {
  if(hasRolled || gameOver || isRolling) return;

  isRolling = true;
  const diceEl = document.getElementById('dice');
  diceEl.classList.add('dice-rolling');

  setTimeout(() => {
    diceValue = Math.floor(Math.random() * 6) + 1;
    diceEl.textContent = diceValue;
    diceEl.classList.remove('dice-rolling');
    isRolling = false;
    hasRolled = true;

    if(!canMove()) setTimeout(nextTurn, 1000);
  }, 900);
};

function canMove() {
  const color = colors[currentPlayer];
  return tokens[color].some(pos => {
    if(pos === 16) return false; // Already at center
    if(pos === -1) return diceValue === 6; // Need 6 to exit home
    return true;
  });
}

function moveToken(color, idx) {
  if(color!== colors[currentPlayer] ||!hasRolled || gameOver || isRolling) return;

  let pos = tokens[color][idx];

  // Exit home on 6
  if(pos === -1 && diceValue === 6) {
    tokens[color][idx] = 0; // Start of red arm
    positionTokens();
    endTurn();
    return;
  }

  if(pos >= 0) {
    let newPos = pos + diceValue;
    if(newPos > 16) return; // Can't overshoot center

    // Check if killing
    checkKill(color, idx, newPos);
    tokens[color][idx] = newPos;

    positionTokens();
    setTimeout(() => endTurn(), 400);
  }
}

function checkKill(color, idx, newPos) {
  if(newPos === 16) return; // No killing at center

  colors.forEach(otherColor => {
    if(otherColor === color) return;
    tokens[otherColor].forEach((tPos, tIdx) => {
      if(tPos === newPos && tPos < 16) {
        tokens[otherColor][tIdx] = -1; // Send home
      }
    });
  });
}

function endTurn() {
  if(tokens[colors[currentPlayer]].every(p => p === 16)) {
    alert(colors[currentPlayer] + ' Wins! 🎉');
    gameOver = true;
    return;
  }

  if(diceValue!== 6) nextTurn();
  else hasRolled = false;
}

function nextTurn() {
  currentPlayer = (currentPlayer + 1) % 4;
  hasRolled = false;
  diceValue = 0;
  document.getElementById('dice').textContent = '🎲';
  document.getElementById('turn').textContent = colors[currentPlayer] + "'s Turn";
  document.getElementById('turn').style.color = colors[currentPlayer];
}

createBoard();
window.addEventListener('resize', positionTokens);
</script>

</body>
</html>
